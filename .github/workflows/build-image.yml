name: Build API
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Setting Up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "graalvm"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Build Jib image
        env:
          JIB_TOKEN: ${{ secrets.JIB_TOKEN }}
        run: |
          chmod +x ./gradlew
          ./gradlew jib -Djib.serialize=true --no-daemon --configuration-cache --build-cache --scan